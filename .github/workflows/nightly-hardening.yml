name: Nightly Hardening

on:
  workflow_dispatch:
    inputs:
      run_backend_postgres:
        description: Run backend PostgreSQL parity checks
        type: boolean
        required: false
        default: false
      run_mobile_e2e_visual:
        description: Run iOS E2E + visual regression on macOS (expensive)
        type: boolean
        required: false
        default: false

concurrency:
  group: nightly-hardening-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-postgres-parity:
    # Guard rail: must be manually requested and explicitly enabled via repo variable.
    if: ${{ vars.ENABLE_BILLED_CI == 'true' && inputs.run_backend_postgres }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: habee
          POSTGRES_PASSWORD: habee
          POSTGRES_DB: habee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U habee -d habee_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_TEST_DATABASE_URL: postgresql://habee:habee@localhost:5432/habee_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run PostgreSQL parity tests
        run: pytest -m postgres -q

  mobile-e2e-visual:
    if: ${{ vars.ENABLE_BILLED_CI == 'true' && inputs.run_mobile_e2e_visual }}
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Install visual test dependency
        run: npm install --no-save jest-image-snapshot
      - name: Run iOS E2E smoke
        run: npm run test:e2e:ios
        continue-on-error: true
      - name: Run iOS visual regression
        run: npm run test:visual
        continue-on-error: true
      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts
          path: |
            frontend/e2e/__image_snapshots__/ios
            frontend/artifacts
          if-no-files-found: ignore
          retention-days: 1
