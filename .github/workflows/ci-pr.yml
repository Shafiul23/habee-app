name: Manual CI

on:
  workflow_dispatch:
    inputs:
      run_backend_unit_integration:
        description: Run backend unit/integration tests
        type: boolean
        required: false
        default: false
      run_backend_contract:
        description: Run backend contract tests
        type: boolean
        required: false
        default: false
      run_frontend_unit_integration:
        description: Run frontend unit/integration tests
        type: boolean
        required: false
        default: false

concurrency:
  group: manual-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-unit-integration:
    # Guard rail: manual workflow input + explicit billed CI opt-in variable.
    if: ${{ vars.ENABLE_BILLED_CI == 'true' && inputs.run_backend_unit_integration }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run backend unit/integration tests
        run: pytest -m "unit or integration" -q

  backend-contract:
    if: ${{ vars.ENABLE_BILLED_CI == 'true' && inputs.run_backend_contract }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run backend contract tests
        run: pytest -m contract -q

  frontend-unit-integration:
    if: ${{ vars.ENABLE_BILLED_CI == 'true' && inputs.run_frontend_unit_integration }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Run frontend unit tests
        run: npm run test:unit
      - name: Run frontend integration tests
        run: npm run test:integration
